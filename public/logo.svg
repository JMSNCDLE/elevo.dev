<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="topFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="leftFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="rightFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
  </defs>
  <!-- Top face (rhombus, lighter) -->
  <polygon points="50,15 85,32 50,49 15,32" fill="url(#topFace)"/>
  <!-- Left face (purple, darker) -->
  <polygon points="15,32 50,49 50,87 15,70" fill="url(#leftFace)"/>
  <!-- Right face (blue, mid) -->
  <polygon points="85,32 85,70 50,87 50,49" fill="url(#rightFace)"/>
</svg>
